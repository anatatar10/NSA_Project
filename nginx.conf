events {}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    upstream web_servers {
        server web1:80;
        server web2:80;
    }

    upstream phpmyadmin_upstream {
        server phpmyadmin:80;
    }

    upstream goaccess_upstream {
        server goaccess:7890;
    }

    server {
        listen 80;
        server_name works-on-my-machine.rip;

        return 301 https://$host:8443$request_uri;
    }

    server {
        listen 443 ssl;
        server_name works-on-my-machine.rip;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location / {
            allow 0.0.0.0/0;
            deny all;

            proxy_pass http://web_servers;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /phpmyadmin/ {
            proxy_pass http://phpmyadmin_upstream/;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /logs/ {
            alias /var/log/goaccess/;
            index index.html;
            try_files $uri $uri/ =404;
        }

        location /goaccess/ws {
            proxy_pass http://goaccess_upstream/goaccess/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host:$server_port;
        }
    }
}