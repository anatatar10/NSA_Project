services:
  # --- 1. REVERSE PROXY & LOAD BALANCER (Port 8080 & 8443) ---
  proxy:
    image: nginx:alpine
    container_name: nsa-proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - frontend
    depends_on:
      - web1
      - web2

  # --- 2. WEB APP REPLICAS (2 Replicas) ---
  web1:
    build: ./web
    restart: always
    command: sh -c "mkdir -p /sessions && chown www-data:www-data /sessions && chmod 770 /sessions && apache2-foreground"
    environment:
      - DB_HOST=db-master
    volumes:
      - sessions:/sessions
    networks:
      - frontend
      - backend

  web2:
    build: ./web
    restart: always
    command: sh -c "mkdir -p /sessions && chown www-data:www-data /sessions && chmod 770 /sessions && apache2-foreground"
    environment:
      - DB_HOST=db-master
    volumes:
      - sessions:/sessions
    networks:
      - frontend
      - backend

  # --- 3. DATABASE MASTER (Writes) ---
  db-master:
    image: mariadb:10.6
    container_name: db-master
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: app_db
    volumes:
      - ./mysql/master:/etc/mysql/conf.d
      - ./mysql/master/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend

  # --- 4. DATABASE SLAVE (Reads) ---
  db-slave:
    image: mariadb:10.6
    container_name: db-slave
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: app_db
    volumes:
      - ./mysql/slave:/etc/mysql/conf.d
      - ./mysql/master/init.sql:/docker-entrypoint-initdb.d/init.sql
    depends_on:
      - db-master
    networks:
      - backend

  # --- 5. PHPMYADMIN (DB Management) ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOSTS: db-master,db-slave
    ports:
      - "8081:80"
    networks:
      - backend

  # --- 6. MAIL SERVER (Email Confirmation) ---
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.works-on-my-machine.rip
    domainname: works-on-my-machine.rip
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
    networks:
      - backend

  # --- 7. CENTRALIZED LOGGING (Dozzle) ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle-logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    networks:
      - backend

  # --- 8. WEB ACCESS LOG ANALYZER ---
  goaccess:
    image: allinurl/goaccess:latest
    container_name: goaccess
    command: /var/log/nginx/access.log --log-format=COMBINED --date-format=%d/%b/%Y --time-format=%T -o /srv/report/index.html --real-time-html --port=7890
    restart: always
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./logs/goaccess:/srv/report
    ports:
      - "7890:7890"
    networks:
      - frontend
    depends_on:
      - proxy

volumes:
  sessions:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
