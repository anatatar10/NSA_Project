services:
  proxy:
    image: nginx:alpine
    container_name: nsa-proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
      - ./logs/goaccess:/var/log/goaccess:ro
    depends_on:
      - web1
      - web2
      - phpmyadmin
      - goaccess
    networks:
      - frontend

  web1:
    build: ./web
    container_name: web1
    restart: always
    environment:
      DB_MASTER_HOST: db-master
      DB_SLAVE_HOST: db-slave
      DB_NAME: app_db
      DB_USER: appuser
      DB_PASS: apppass
      APP_DOMAIN: works-on-my-machine.rip
      APP_PORT: 8443
      MAIL_HOST: mailserver
      MAIL_PORT: 1025
      MAIL_FROM: noreply@works-on-my-machine.rip
    volumes:
      - sessions:/sessions
    depends_on:
      - db-master
      - db-slave
      - mailserver
    networks:
      - frontend
      - backend

  web2:
    build: ./web
    container_name: web2
    restart: always
    environment:
      DB_MASTER_HOST: db-master
      DB_SLAVE_HOST: db-slave
      DB_NAME: app_db
      DB_USER: appuser
      DB_PASS: apppass
      APP_DOMAIN: works-on-my-machine.rip
      APP_PORT: 8443
      MAIL_HOST: mailserver
      MAIL_PORT: 1025
      MAIL_FROM: noreply@works-on-my-machine.rip
    volumes:
      - sessions:/sessions
    depends_on:
      - db-master
      - db-slave
      - mailserver
    networks:
      - frontend
      - backend

  db-master:
    image: mariadb:10.11
    container_name: db-master
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: app_db
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass
      MARIADB_REPLICATION_USER: repl
      MARIADB_REPLICATION_PASSWORD: replpass
    volumes:
      - db_master_data:/var/lib/mysql
      - ./mysql/master/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - backend

  db-slave:
    image: mariadb:10.11
    container_name: db-slave
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: app_db
      MARIADB_USER: appuser
      MARIADB_PASSWORD: apppass
      MARIADB_MASTER_HOST: db-master
      MARIADB_REPLICATION_USER: repl
      MARIADB_REPLICATION_PASSWORD: replpass
    volumes:
      - db_slave_data:/var/lib/mysql
      - ./mysql/slave/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/slave/init-slave.sh:/docker-entrypoint-initdb.d/02-init-slave.sh:ro
    depends_on:
      - db-master
    networks:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_HOSTS: db-master,db-slave
      PMA_PORT: 3306
    networks:
      - frontend
      - backend

  mailserver:
    image: axllent/mailpit:latest
    container_name: mailserver
    restart: always
    ports:
      - "8025:8025"
    networks:
      - backend

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle-logs
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8888:8080"
    networks:
      - backend

  goaccess:
    image: allinurl/goaccess:latest
    container_name: goaccess
    restart: always
    command: >
      /var/log/nginx/access.log
      --log-format=COMBINED
      --real-time-html
      --port=7890
      --ws-url=wss://works-on-my-machine.rip:8443/goaccess/ws
      -o /srv/report/index.html
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./logs/goaccess:/srv/report
    networks:
      - frontend

volumes:
  db_master_data:
  db_slave_data:
  sessions:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge