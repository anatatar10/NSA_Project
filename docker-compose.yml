version: '3.8'

services:
  # --- 1. REVERSE PROXY & LOAD BALANCER (Port 8080 & 8443) ---
  proxy:
    image: nginx:alpine
    container_name: nsa-proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - frontend
    depends_on:
      - web

  # --- 2. WEB APP REPLICAS (2 Replicas) ---
  web:
    build: ./web
    restart: always
    deploy:
      replicas: 2
    environment:
      - DB_HOST=db-master
      - REDIS_HOST=redis
    networks:
      - frontend
      - backend

  # --- 3. DATABASE MASTER (Writes) ---
  db-master:
    image: mariadb:10.6
    container_name: db-master
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: app_db
    volumes:
      - ./mysql/master:/etc/mysql/conf.d
      - ./mysql/master/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend

  # --- 4. DATABASE SLAVE (Reads) ---
  db-slave:
    image: mariadb:10.6
    container_name: db-slave
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - ./mysql/slave:/etc/mysql/conf.d
    depends_on:
      - db-master
    networks:
      - backend

  # --- 5. REDIS (Session Persistence) ---
  redis:
    image: redis:7-alpine
    container_name: redis-session
    networks:
      - backend

  # --- 6. PHPMYADMIN (DB Management) ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    environment:
      PMA_HOSTS: db-master,db-slave
    ports:
      - "8081:80"
    networks:
      - backend

  # --- 7. MAIL SERVER (Email Confirmation) ---
  mailserver:
    image: mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.works-on-my-machine.rip
    domainname: works-on-my-machine.rip
    environment:
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=0
    networks:
      - backend

  # --- 8. CENTRALIZED LOGGING (Dozzle) ---
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle-logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8080"
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
